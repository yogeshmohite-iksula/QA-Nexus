name: CI

# Spec: MS0-T005 (GitHub Actions CI) + P1.7 of
# docs/audits/2026-04-27-skill-alignment-audit.md.
# Runs on every PR to main. All six jobs must pass before merge.

on:
  pull_request:
    branches: [main]

# Cancel superseded runs when a PR is force-pushed.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (eslint + prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: typecheck (tsc -p)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build shared first — apps/web typecheck imports `@qa-nexus/shared`
      # types but doesn't trigger the workspace dep build itself (and
      # `pnpm install` doesn't run workspace build scripts). Without this
      # step, web's tsc errors with TS2307: Cannot find module.
      - run: pnpm --filter @qa-nexus/shared build
      - run: pnpm -r typecheck

  test:
    name: test (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build the shared package once so dependent workspaces' jest specs can
      # resolve `@qa-nexus/shared` types and runtime exports.
      - run: pnpm --filter @qa-nexus/shared build
      # Enumerate test workspaces explicitly. Don't use `pnpm -r test` or
      # `pnpm --filter '!@qa-nexus/e2e' test`: both forms re-invoke the
      # root `qa-nexus` package's `test` script, which itself does
      # `pnpm -r run test` and pulls @qa-nexus/e2e back in.
      # Each script handles its own no-test case (api: jest
      # --passWithNoTests; shared: node -e exit-0).
      # @qa-nexus/e2e (Playwright) runs in the dedicated `playwright`
      # workflow (.github/workflows/e2e.yml), not here.
      - run: pnpm --filter @qa-nexus/api --filter @qa-nexus/shared test

  build:
    name: build (web + api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build shared first so `next build` can resolve `@qa-nexus/shared`
      # imports. apps/api's own build script already builds shared
      # internally, but apps/web's `next build` does not.
      - run: pnpm --filter @qa-nexus/shared build
      - run: pnpm --filter web build
      - run: pnpm --filter api build

  hook-validation:
    name: hook-validation (PreToolUse Edit|Write dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history needed to diff against PR base
      - name: Run PreToolUse hooks against changed files
        run: bash .github/scripts/run-pretooluse-hooks.sh

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          VERSION=8.21.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan repo for secrets
        # --redact prevents matched values from being printed to logs.
        # --no-banner keeps logs short. .gitleaks.toml is auto-discovered at root.
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose --no-banner
