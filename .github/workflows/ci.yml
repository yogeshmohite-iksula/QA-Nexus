name: CI

# Spec: MS0-T005 (GitHub Actions CI) + P1.7 of
# docs/audits/2026-04-27-skill-alignment-audit.md + followup (j) Day-4
# (closes the direct-to-main observability hole exposed in Day-3
# stretch when commit 6385e25 broke 3 CI jobs but was only surfaced
# when PR #11 opened the next morning).
# Runs on every PR to main + every push to main. All six jobs must
# pass before merge.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs when a PR is force-pushed.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (eslint + prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: typecheck (tsc -p)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build shared first — apps/web typecheck imports `@qa-nexus/shared`
      # types but doesn't trigger the workspace dep build itself (and
      # `pnpm install` doesn't run workspace build scripts). Without this
      # step, web's tsc errors with TS2307: Cannot find module.
      - run: pnpm --filter @qa-nexus/shared build
      - run: pnpm -r typecheck

  test:
    name: test (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build the shared package once so dependent workspaces' jest specs can
      # resolve `@qa-nexus/shared` types and runtime exports.
      - run: pnpm --filter @qa-nexus/shared build
      # Enumerate test workspaces explicitly. Don't use `pnpm -r test` or
      # `pnpm --filter '!@qa-nexus/e2e' test`: both forms re-invoke the
      # root `qa-nexus` package's `test` script, which itself does
      # `pnpm -r run test` and pulls @qa-nexus/e2e back in.
      # Each script handles its own no-test case (api: jest
      # --passWithNoTests; shared: node -e exit-0).
      # @qa-nexus/e2e (Playwright) runs in the dedicated `playwright`
      # workflow (.github/workflows/e2e.yml), not here.
      - run: pnpm --filter @qa-nexus/api --filter @qa-nexus/shared test

  build:
    name: build (web + api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build shared first so `next build` can resolve `@qa-nexus/shared`
      # imports. apps/api's own build script already builds shared
      # internally, but apps/web's `next build` does not.
      - run: pnpm --filter @qa-nexus/shared build
      - run: pnpm --filter web build
      - run: pnpm --filter api build

  hook-validation:
    name: hook-validation (PreToolUse Edit|Write dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history needed to diff against PR base
      - name: Run PreToolUse hooks against changed files
        run: bash .github/scripts/run-pretooluse-hooks.sh

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          VERSION=8.21.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan repo for secrets
        # --redact prevents matched values from being printed to logs.
        # --no-banner keeps logs short. .gitleaks.toml is auto-discovered at root.
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose --no-banner

  visual-regression:
    # Spec: Day-18 evening brief. Runs the apps/web/tests/visual/
    # Playwright VR suite on every PR that touches FE code or the
    # VR scaffolding itself. Sister to .github/workflows/e2e.yml
    # (which is behavioural, NOT pixel-diff).
    #
    # Path-filtered at the job level so doc/config-only PRs skip it.
    # On diff failure, uploads the diff PNGs so a reviewer can
    # download + inspect (the artifact name carries the run id +
    # PR number for traceability).
    #
    # Free-tier discipline: chromium-only browser install (~140 MB),
    # 4 viewports run serially (1 worker in CI), HTML report is
    # uploaded only on failure to keep storage minimal.
    name: visual-regression (playwright vr — apps/web)
    runs-on: ubuntu-latest
    # Path filter — skip on doc/config-only PRs.
    if: |
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.changed_files || 'apps/web', 'apps/web')
    timeout-minutes: 15
    env:
      CI: "true"
      # VR_BASELINES_READY left UNSET until FE+1's seed PR lands the
      # canonical/F08/{320,768,1024,1440}.png baselines — without
      # baselines, Playwright can't compare and the suite would FAIL.
      # FE+1's seed PR (Day-19 morning) flips this to "1" alongside
      # the canonical PNG commit. Until then, home.spec.ts test.skip()
      # ensures CI stays green even when this job runs.
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers (chromium only — free tier)
        run: pnpm --filter web exec playwright install --with-deps chromium
      - name: Build shared + web
        run: |
          pnpm --filter @qa-nexus/shared build
          pnpm --filter web build
      - name: Start FE (next start) in background
        # next start serves the production build; faster + more stable
        # than `next dev` for VR (no HMR / no source-map injection).
        run: |
          (pnpm --filter web exec next start --port 3000 > /tmp/web.log 2>&1) &
          echo "WEB_PID=$!" >> "$GITHUB_ENV"
      - name: Wait for FE to be ready
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:3000 > /dev/null 2>&1; then
              echo "FE ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "FE failed to start within 30s — tail of /tmp/web.log:"
          tail -50 /tmp/web.log
          exit 1
      - name: Run Playwright VR suite
        run: pnpm --filter web test:visual
      - name: Upload VR diff artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          # Reviewer-facing name carries PR # + run id so multi-PR queue
          # triage stays sortable.
          name: vr-diffs-pr${{ github.event.pull_request.number || 'push' }}-run${{ github.run_id }}
          path: |
            apps/web/playwright-report-visual/
            apps/web/test-results/
          retention-days: 14
      - name: Stop background FE
        if: always()
        run: |
          if [ -n "${WEB_PID:-}" ]; then kill "$WEB_PID" 2>/dev/null || true; fi
