name: Deploy

# Spec: MS0-T005 + P1.7 of docs/audits/2026-04-27-skill-alignment-audit.md.
# Triggered on every push to main (i.e., after a PR is merged).
# Deploys apps/web to Cloudflare Pages (project `qa-nexus-web`, free tier).
# apps/api lives on Render free Hobby with auto-deploy from main, so it is
# NOT deployed from here — Render watches the repo directly.

on:
  push:
    branches: [main]

# Never cancel an in-flight production deploy.
concurrency:
  group: deploy-${{ github.workflow }}-main
  cancel-in-progress: false

jobs:
  deploy-cf-pages:
    name: deploy apps/web to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build the @qa-nexus/shared workspace package first so its dist/ exists
      # before next build resolves `import ... from '@qa-nexus/shared'` in
      # apps/web/lib/api/*.ts. Without this, next build fails with
      # "Module not found: Can't resolve '@qa-nexus/shared'".
      - run: pnpm --filter @qa-nexus/shared build
      - run: pnpm --filter web build
      - name: Deploy to Cloudflare Pages
        # Required GitHub repo secret: CLOUDFLARE_API_TOKEN (Pages:Edit scope)
        # Optional secret: CLOUDFLARE_ACCOUNT_ID (newer wrangler auto-detects
        # from the API token, but pinning is safer). Set both via:
        #   gh secret set CLOUDFLARE_API_TOKEN  --body "$CLOUDFLARE_API_TOKEN"  -R yogeshmohite-iksula/QA-Nexus
        #   gh secret set CLOUDFLARE_ACCOUNT_ID --body "$CLOUDFLARE_ACCOUNT_ID" -R yogeshmohite-iksula/QA-Nexus
        #
        # Use `pnpm dlx wrangler@latest` directly instead of cloudflare/wrangler-action@v3
        # because the action internally runs `pnpm add wrangler` at the cwd, which under
        # pnpm 10 + workspace root errors with ERR_PNPM_ADDING_TO_ROOT (must use -w flag).
        # The direct dlx call mirrors the local `pnpm deploy:web` script exactly and
        # avoids the workspace-root install entirely.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm dlx wrangler@latest pages deploy apps/web/out --project-name=qa-nexus-web --branch=main --commit-dirty=true
