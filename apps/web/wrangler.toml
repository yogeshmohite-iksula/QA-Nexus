#
# Mode: Direct Upload (NOT GitHub-connected). Deploys are triggered by
# `pnpm deploy:web` from the repo root. GitHub auto-deploy on push to
# main is a follow-up task -- requires authorizing the Cloudflare Pages
# GitHub App on yogeshmohite-iksula/QA-Nexus via the CF dashboard UI.
#
# Build pipeline:
#   1. `pnpm --filter web build` produces `apps/web/out/` via
#      `output: 'export'` (see next.config.ts).
#   2. `wrangler pages deploy apps/web/out --project-name=qa-nexus-web`
#      uploads the static files to CF object storage.
#   3. CF Pages serves them globally from edge -- $0/month at 8-user
#      pilot scale (free tier: unlimited requests, 500 builds/month).
#
# Cost: $0/month. Pilot stays well within free-tier limits.

name = "qa-nexus-web"
pages_build_output_dir = "out"
compatibility_date = "2026-04-26"
